# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: '3.0'
metadata:
  name: com.yourcompany.myreactapp
type: application
framework:
  name: SAPUI5
  version: '1.120.0'
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: themelib_sap_horizon
resources:
  configuration:
    paths:
      webapp: webapp
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4H1
          url: http://202.153.35.211:50000/
          client: '100'
        app:
          name: ZREACTAPP
          description: React App on Fiori Launchpad
          package: ZFTX
          transport: S4HK904966
        safe: false
        exclude:
          - /test/
          - /react-app/static/media/
